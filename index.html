<html>
    <head>
        <meta charset="UTF-8">
        <title>more than just quacks</title>
        <meta name="description" content="quackers: make fun beats!">
        <meta property="og:title" content="more than just quacks">
        <meta property="og:description" content="quackers: make fun beats!">
        <meta property="og:image" content="preview.png">
        <meta property="og:image:secure_url" content="preview.png">
        <meta property="og:image:type" content="image/png">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
        <meta property="og:type" content="website">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="more than just quacks">
        <meta name="twitter:description" content="quackers: make fun beats!">
        <meta name="twitter:image" content="preview.png">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>quackers</h1>

        <div class="controls">
            <button id="play-btn">&#9654;</button>
            <div class="ctrl-group">
                <span class="ctrl-label">bpm</span>
                <input type="range" id="bpm" min="60" max="240" value="120" step="1">
                <span class="bpm-val" id="bpm-val">120</span>
            </div>

            <div class="divider"></div>

            <div class="ctrl-group">
                <span class="ctrl-label">scale</span>
                <select id="scale-sel">
                    <option value="major">major</option>
                    <option value="minor">minor</option>
                    <option value="pentatonic">pentatonic</option>
                    <option value="dorian">dorian</option>
                    <option value="chromatic">chromatic</option>
                </select>
            </div>

            <div class="ctrl-group">
                <span class="ctrl-label">key</span>
                <select id="key-sel">
                    <option value="60">C</option>
                    <option value="61">C#</option>
                    <option value="62">D</option>
                    <option value="63">Eb</option>
                    <option value="64">E</option>
                    <option value="65">F</option>
                    <option value="66">F#</option>
                    <option value="67">G</option>
                    <option value="68">Ab</option>
                    <option value="69">A</option>
                    <option value="70">Bb</option>
                    <option value="71">B</option>
                </select>
            </div>

            <button id="clear-btn">clear</button>
            <button id="piano-toggle-btn">piano</button>
            <button id="share-btn">share</button>
        </div>

        <div class="step-indicator-wrap">
            <div class="step-indicator-spacer"></div>
            <div class="step-dots" id="step-dots"></div>
        </div>

        <div class="grid-outer">
            <div class="layer-row">
                <div class="layer-label">
                    <span class="layer-name">melody</span>
                    <span class="layer-sub">bell</span>
                </div>
                <div class="staff melody" id="melody-staff">
                    <div class="cell-grid" id="melody-grid"></div>
                </div>
            </div>

            <div class="layer-row">
                <div class="layer-label">
                    <span class="layer-name">bass</span>
                    <span class="layer-sub">round</span>
                </div>
                <div class="staff bass" id="bass-staff">
                    <div class="cell-grid" id="bass-grid"></div>
                </div>
            </div>

            <div class="layer-row">
                <div class="layer-label">
                    <span class="layer-name">drums</span>
                    <span class="layer-sub">noise</span>
                </div>
                <div class="staff drums" id="drums-staff">
                    <div class="cell-grid" id="drums-grid"></div>
                    <div class="drum-label-col">
                        <span class="drum-label">HH</span>
                        <span class="drum-label">KK</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="viz-wrap" id="viz-wrap">
            <div class="viz-label-col">
                <span class="viz-label">output</span>
            </div>
            <canvas id="viz"></canvas>
        </div>

        <div id="piano-popup">
            <div class="piano-popup-header">
                <span class="piano-popup-label">piano</span>
                <button class="piano-close" id="piano-close">&#10005;</button>
            </div>
            <div class="piano" id="piano"></div>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>
