<html>
    <head>
        <meta charset="UTF-8">
        <title>more than just quacks</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div id="title">more than just quacks</div>
            <button id="spawn-btn" draggable="true">
                <img src="ceiling.png" alt="spawn ceiling">
            </button>
        </header>

        <div id="layout">
            <div id="panel">
                <div class="panel-label">creatures</div>

                <div class="creature-card" data-type="ceiling" draggable="true">
                    <div class="card-img-wrap">
                        <img src="ceiling.png" alt="ceiling">
                    </div>
                    <div class="card-info">
                        <div class="card-name">ceiling</div>
                        <div class="card-desc">barks in key</div>
                    </div>
                </div>

                <div class="creature-card" data-type="chicken" draggable="true">
                    <div class="card-img-wrap">
                        <img src="chicken.png" alt="chicken">
                    </div>
                    <div class="card-info">
                        <div class="card-name">chicken</div>
                        <div class="card-desc">squeaks melodically</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="bar">
            <button id="stop" class="bar-btn">■</button>
            <button id="play" class="bar-btn play">▶</button>
            <div id="bpm-control">
                <button class="bpm-btn" id="bpm-down">-</button>
                <span id="bpm-value">120</span>
                <span id="bpm-label">BPM</span>
                <button class="bpm-btn" id="bpm-up">+</button>
            </div>
            <div id="playhead-display">00:00</div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
